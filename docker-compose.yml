services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: woms
      POSTGRES_USER: woms
      POSTGRES_PASSWORD: woms
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.8.0
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api:
    image: docker.io/${DOCKERHUB_NAMESPACE:-your-dockerhub-namespace}/woms-api:${WOMS_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      HTTP_ADDR: ":8080"
      JWT_SECRET: local-dev-secret
      API_STORE: postgres
      DEMO_SEED_DATA: "true"
      DATABASE_URL: postgres://woms:woms@postgres:5432/woms?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_SCHEDULE_TOPIC: woms.schedule.jobs
      KAFKA_PUBLISH_ENABLED: "true"
    depends_on:
      - postgres
      - redis
      - kafka
    ports:
      - "8080:8080"

  scheduler-worker:
    image: docker.io/${DOCKERHUB_NAMESPACE:-your-dockerhub-namespace}/woms-scheduler-worker:${WOMS_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_SCHEDULE_TOPIC: woms.schedule.jobs
      KAFKA_CONSUMER_GROUP: woms-scheduler-workers
      DATABASE_URL: postgres://woms:woms@postgres:5432/woms?sslmode=disable
      WORKER_MIN_JOB_DURATION_MS: "500"
      WORKER_MAX_RETRIES: "3"
    depends_on:
      - postgres
      - redis
      - kafka

  web:
    image: docker.io/${DOCKERHUB_NAMESPACE:-your-dockerhub-namespace}/woms-web:${WOMS_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    ports:
      - "8081:8080"

  # ─── Monitoring Stack ───────────────────────────────────────────
  # Gthulhu: infrastructure metrics agent for Postgres, Redis, Kafka
  # gthulhu:
  #   image: ghcr.io/gthulhu/gthulhu:latest
  #   environment:
  #     GTHULHU_POSTGRES_DSN: postgres://woms:woms@postgres:5432/woms?sslmode=disable
  #     GTHULHU_REDIS_ADDR: redis:6379
  #     GTHULHU_KAFKA_BROKERS: kafka:9092
  #     GTHULHU_METRICS_PORT: "9091"
  #   depends_on:
  #     - postgres
  #     - redis
  #     - kafka
  #   ports:
  #     - "9091:9091"

  # Prometheus: central metrics scraper
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
      # - gthulhu
    ports:
      - "9090:9090"

  # Grafana: dashboards with anonymous read-only access for iframe embed
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: disabled
      GF_SECURITY_COOKIE_SECURE: "false"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  grafana-storage:

