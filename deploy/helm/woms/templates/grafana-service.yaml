{{- if and .Values.monitoring.enabled .Values.monitoring.grafana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "woms.fullname" . }}-grafana
  labels:
    {{- include "woms.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
{{- end }}
