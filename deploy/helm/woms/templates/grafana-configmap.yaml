{{- if and .Values.monitoring.enabled .Values.monitoring.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "woms.fullname" . }}-grafana-datasources
  labels:
    {{- include "woms.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: PBFA97CFB590B2093
        access: proxy
        url: http://{{ include "woms.fullname" . }}-prometheus:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "woms.fullname" . }}-grafana-dashboard-provider
  labels:
    {{- include "woms.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: WOMS
        orgId: 1
        folder: WOMS
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "woms.fullname" . }}-grafana-dashboards
  labels:
    {{- include "woms.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  {{- range $path, $bytes := .Files.Glob "dashboards/*.json" }}
  {{ $path | base }}: |-
    {{ $.Files.Get $path | nindent 4 }}
  {{- end }}
{{- end }}
