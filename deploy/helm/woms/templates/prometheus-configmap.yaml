{{- if and .Values.monitoring.enabled .Values.monitoring.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "woms.fullname" . }}-prometheus
  labels:
    {{- include "woms.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.monitoring.prometheus.scrape.api.interval }}
      evaluation_interval: 15s

    scrape_configs:
      - job_name: woms-api
        metrics_path: {{ .Values.monitoring.prometheus.scrape.api.path }}
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ include "woms.fullname" . }}-api
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http
          - target_label: service
            replacement: woms-api
          - target_label: namespace
            replacement: {{ .Release.Namespace }}

      {{- if and .Values.gthulhu.enabled .Values.monitoring.prometheus.scrape.gthulhu.enabled }}
      - job_name: gthulhu-monitor
        metrics_path: {{ .Values.monitoring.prometheus.scrape.gthulhu.path }}
        scrape_interval: {{ .Values.monitoring.prometheus.scrape.gthulhu.interval }}
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ tpl .Values.monitoring.prometheus.scrape.gthulhu.service . }}
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: monitor-metrics
          - target_label: service
            replacement: gthulhu-monitor
          - target_label: namespace
            replacement: {{ .Release.Namespace }}
      {{- end }}
{{- end }}
