{{- if and .Values.monitoring.enabled .Values.monitoring.grafana.enabled (not .Values.monitoring.grafana.admin.existingSecret) }}
{{- $secretName := include "woms.grafanaAdminSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $userKey := .Values.monitoring.grafana.admin.userKey -}}
{{- $passwordKey := .Values.monitoring.grafana.admin.passwordKey -}}
{{- $adminPassword := .Values.monitoring.grafana.admin.password -}}
{{- if not $adminPassword -}}
{{- if and $existing (hasKey $existing.data $passwordKey) -}}
{{- $adminPassword = (index $existing.data $passwordKey | b64dec) -}}
{{- else -}}
{{- $adminPassword = randAlphaNum 32 -}}
{{- end -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "woms.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
type: Opaque
stringData:
  {{ $userKey }}: {{ .Values.monitoring.grafana.admin.user | quote }}
  {{ $passwordKey }}: {{ $adminPassword | quote }}
{{- end }}
