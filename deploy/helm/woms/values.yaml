global:
  imagePullPolicy: IfNotPresent

imageRegistry: docker.io/d11nn

api:
  replicaCount: 2
  pdb:
    minAvailable: 1
  image:
    repository: woms-api
    tag: v0.1.47
  jwtSecret: ""
  env:
    store: postgres
    demoSeedData: "true"
    databaseUrl: postgres://woms:woms@postgres:5432/woms?sslmode=disable
    redisAddr: redis-master:6379
    kafkaBrokers: kafka:9092
    scheduleTopic: woms.schedule.jobs
    kafkaPublishEnabled: "true"
    corsAllowedOrigin: "*"
    authMode: local
    authSessionStore: ""
    dependencyRetryTimeoutMs: "120000"
    dependencyRetryIntervalMs: "2000"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  replicaCount: 1
  image:
    repository: woms-scheduler-worker
    tag: v0.1.47
  env:
    databaseUrl: postgres://woms:woms@postgres:5432/woms?sslmode=disable
    redisAddr: redis-master:6379
    minJobDurationMs: "0"
    maxRetries: "3"
    lockTtlMs: "15000"
    lockRenewIntervalMs: "5000"
    lockTimeoutMs: "10000"
    backfillIntervalMs: "5000"
    dependencyRetryTimeoutMs: "120000"
    dependencyRetryIntervalMs: "2000"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

web:
  replicaCount: 2
  pdb:
    minAvailable: 1
  image:
    repository: woms-web
    tag: v0.1.47
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: false
  className: nginx
  host: woms.local
  tls:
    enabled: false
    secretName: woms-tls
  auth:
    enabled: true

keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 30
  cooldownPeriod: 120
  hpa:
    scaleUp:
      stabilizationWindowSeconds: 0
      percent: 100
      periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      percent: 50
      periodSeconds: 60
  kafka:
    enabled: true
    bootstrapServers: "kafka.{{ .Release.Namespace }}.svc.cluster.local:9092"
    topic: woms.schedule.jobs
    consumerGroup: woms-scheduler-workers
    lagThreshold: "10"
    offsetResetPolicy: latest
  cpu:
    enabled: true
    targetUtilization: "70"
  gthulhu:
    enabled: false
    prometheusServerAddress: "http://monitoring-kube-prometheus-prometheus.monitoring:9090"
    metricName: woms_worker_gthulhu_involuntary_ctx_switches_rate
    threshold: "20"
    query: |-
      avg(rate(gthulhu_pod_involuntary_ctx_switches_total{exported_namespace="{{ .Release.Namespace }}",pod_name=~"{{ include "woms.fullname" . }}-worker-.*"}[2m]))

gthulhu:
  enabled: false
  crdNamespace:
    create: false
    name: '{{ .Release.Namespace }}'
  scheduler:
    runtimeMode: scheduler
    image:
      repository: docker.io/d11nn/gthulhu-scx
      pullPolicy: IfNotPresent
      tag: "vX.Y.Z"
    sidecar:
      enabled: false
    config:
      mode: none
      kernelMode: false
      maxTimeWatchdog: false
      earlyProcessing: false
      builtinIdle: false
    monitor:
      enabled: true
      bpfObjectPath: /gthulhu/sched_monitor.bpf.o
      collectionIntervalSec: 10
      monitorAll: false
      streamEvents: false
      prometheusPort: 9090
      enableCRDWatcher: true
      kubeConfigPath: ""
    api:
      enabled: false
      authEnabled: false
      interval: 5
  manager:
    enabled: false
  mongodb:
    enabled: false
  monitoring:
    enabled: true
    path: /metrics
    serviceMonitor:
      enabled: false
      labels: {}
      interval: 15s
  podSchedulingMetrics:
    enabled: true
    name: '{{ include "woms.fullname" . }}-worker-monitor'
    namespace: '{{ .Release.Namespace }}'
    labelSelectors:
      - key: app.kubernetes.io/component
        value: scheduler-worker
      - key: app.kubernetes.io/instance
        value: '{{ .Release.Name }}'
    k8sNamespaces:
      - '{{ .Release.Namespace }}'
    collectionIntervalSeconds: 10
    commandRegex: ""
    metrics:
      voluntaryCtxSwitches: true
      involuntaryCtxSwitches: true
      cpuTimeNs: true
      waitTimeNs: true
      runCount: true
      cpuMigrations: true

postgresql:
  enabled: true
  fullnameOverride: postgres
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 16.4.0-debian-12-r14
  auth:
    username: woms
    password: woms
    database: woms
  primary:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

redis:
  enabled: true
  fullnameOverride: redis
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 7.2.5-debian-12-r4
  architecture: standalone
  auth:
    enabled: false
  master:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

kafka:
  enabled: true
  fullnameOverride: kafka
  image:
    registry: docker.io
    repository: bitnamilegacy/kafka
    tag: 3.7.1-debian-12-r4
  controller:
    replicaCount: 1
    extraConfigYaml:
      default.replication.factor: 1
      min.insync.replicas: 1
      offsets.topic.replication.factor: 1
      transaction.state.log.min.isr: 1
      transaction.state.log.replication.factor: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  broker:
    replicaCount: 0
  kraft:
    enabled: true
  listeners:
    client:
      protocol: PLAINTEXT
  provisioning:
    enabled: false

kafkaTopic:
  enabled: true
  image:
    repository: docker.io/bitnamilegacy/kafka
    tag: 3.7.1-debian-12-r4
    pullPolicy: IfNotPresent
  activeDeadlineSeconds: 420
  wait:
    maxAttempts: 60
    sleepSeconds: 5
  partitions: 0
  replicationFactor: 1

# ─── Monitoring Stack ───────────────────────────────────────────
monitoring:
  enabled: true

  # Prometheus scrape annotations (ServiceMonitor or pod annotations)
  prometheus:
    enabled: true
    image:
      repository: prom/prometheus
      tag: "v2.53.0"
    scrape:
      # API pods: scrape /metrics on port 8080
      api:
        path: /metrics
        port: "8080"
        interval: 15s
      # Gthulhu pods: scrape /metrics on port 9091
      gthulhu:
        enabled: false
        path: /metrics
        service: '{{ .Release.Name }}-gthulhu-scheduler-sidecar'
        port: "9090"
        interval: 15s

  # Grafana deployment with anonymous viewer access for iframe embedding
  grafana:
    enabled: true
    externalPath: /grafana
    image:
      repository: grafana/grafana
      tag: "10.4.7"
    env:
      anonymousEnabled: "true"
      anonymousOrgRole: Viewer
      allowEmbedding: "true"
      serveFromSubPath: "true"
      rootUrl: ""
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
