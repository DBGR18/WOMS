{{- if .Values.enabled }}
{{- if not .Values.auth.existingSecret }}
{{- $name := printf "%s-auth" (include "mongodb.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $rootPassword := .Values.auth.rootPassword -}}
{{- if and (not $rootPassword) $existing $existing.data (hasKey $existing.data "MONGO_INITDB_ROOT_PASSWORD") -}}
{{- $rootPassword = (index $existing.data "MONGO_INITDB_ROOT_PASSWORD" | b64dec) -}}
{{- else if not $rootPassword -}}
{{- $rootPassword = randAlphaNum 32 -}}
{{- end }}
# MongoDB Auth Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "mongodb.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: {{ .Values.auth.rootUsername | quote }}
  MONGO_INITDB_ROOT_PASSWORD: {{ $rootPassword | quote }}
{{- end }}
{{- end }}
