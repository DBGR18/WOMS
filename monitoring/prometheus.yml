global:
  scrape_interval: 1s
  evaluation_interval: 5s

scrape_configs:
  # ── Go API service metrics ──────────────────────────────────────
  - job_name: woms-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080
        labels:
          service: woms-api

